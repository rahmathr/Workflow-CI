name: Workflow CI - Heart Disease MLProject

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 dagshub matplotlib seaborn

      # ── 4. Set DagsHub credentials ───────────────────────────────────────────
      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/rahmathr/Eksperimen_SML_Rahmat.mlflow" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=rahmathr" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV
          echo "DAGSHUB_USER_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      # ── 5. Run MLflow Project ────────────────────────────────────────────────
      - name: Run MLflow Project
        run: |
          mlflow run MLProject \
            --env-manager=local \
            -P n_estimators=100 \
            -P max_depth=None \
            -P min_samples_split=5 \
            -P min_samples_leaf=2

      # ── 6. Simpan artefak ke GitHub ──────────────────────────────────────────
      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            confusion_matrix.png
            feature_importance.png
            roc_curve.png
            classification_report.txt
          retention-days: 30

      # ── 7. Build & Push Docker Image ke Docker Hub ───────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image with MLflow
        run: |
          # Ambil run_id dari run terakhir
          RUN_ID=$(python -c "
          import mlflow, os
          import dagshub
          dagshub.init(repo_owner='rahmathr', repo_name='Eksperimen_SML_Rahmat', mlflow=True)
          client = mlflow.tracking.MlflowClient()
          runs = client.search_runs(experiment_ids=['0'], order_by=['start_time DESC'], max_results=1)
          print(runs[0].info.run_id)
          ")
          echo "Run ID: $RUN_ID"

          # Build docker image
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/random_forest_ci" \
            --name "${{ secrets.DOCKER_USERNAME }}/heart-disease-model" \
            --enable-mlserver

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest
