name: Workflow CI - Heart Disease MLProject

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 dagshub matplotlib seaborn

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/rahmathr/Eksperimen_SML_Rahmat.mlflow" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=rahmathr" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV
          echo "DAGSHUB_USER_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Run MLflow Project
        run: |
          export RUN_ID_PATH=$GITHUB_WORKSPACE/run_id.txt
          echo "RUN_ID_PATH=$RUN_ID_PATH" >> $GITHUB_ENV
          mlflow run MLProject \
            --env-manager=local \
            -P n_estimators=100 \
            -P max_depth=None \
            -P min_samples_split=5 \
            -P min_samples_leaf=2

      - name: Read Run ID
        run: |
          if [ -f "$RUN_ID_PATH" ]; then
            RUN_ID=$(cat $RUN_ID_PATH | tr -d '[:space:]')
          else
            RUN_ID=$(python -c "
          import mlflow, dagshub
          dagshub.init(repo_owner='rahmathr', repo_name='Eksperimen_SML_Rahmat', mlflow=True)
          client = mlflow.tracking.MlflowClient()
          runs = client.search_runs(experiment_ids=['0'], order_by=['attributes.start_time DESC'], max_results=1)
          print(runs[0].info.run_id)
          ")
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            confusion_matrix.png
            feature_importance.png
            roc_curve.png
            classification_report.txt
          retention-days: 30

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image with MLflow
        run: |
          IMAGE_NAME="rahmathrr/heart-disease-model"
          echo "Building Docker image: $IMAGE_NAME untuk run: $RUN_ID"
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/random_forest_ci" \
            --name "$IMAGE_NAME" \
            --enable-mlserver

      - name: Push Docker Image
        run: |
          docker push rahmathrr/heart-disease-model:latest
